name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  CLOUDFLARE_ACCOUNT_ID: "474ec25fd6740601eb30f354596c81a3"
  # Public Supabase keys (anon/publishable — safe to expose; they ship in the client bundle).
  VITE_SUPABASE_URL: "https://wwerwoikflqopyrbsgva.supabase.co"
  VITE_SUPABASE_PROJECT_ID: "wwerwoikflqopyrbsgva"
  VITE_SUPABASE_PUBLISHABLE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3ZXJ3b2lrZmxxb3B5cmJzZ3ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzODI5NjAsImV4cCI6MjA5Njk1ODk2MH0.dgHOEiiEzv4vwK1MOBVN8UybFpZnObpHciLQ25mGeSg"

# One deploy at a time per branch; superseded PR builds get cancelled,
# but main deploys always run to completion in order.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Production deploy — push to main or manual dispatch.
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy -c wrangler.deploy.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # PR preview — uploads a version without touching production traffic
  # and comments the preview URL on the PR.
  preview:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload preview version
        id: preview
        run: |
          npx wrangler versions upload -c wrangler.deploy.jsonc 2>&1 | tee upload.log
          URL=$(grep -Eo 'https://[A-Za-z0-9.-]+\.workers\.dev' upload.log | head -1)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "**Preview:** $URL" >> "$GITHUB_STEP_SUMMARY"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Comment preview URL on PR
        if: steps.preview.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.url }}';
            const marker = '<!-- cf-preview-url -->';
            const body = `${marker}\n🚀 **Preview deployed:** ${url}\n\n_Updated for ${context.payload.pull_request.head.sha.slice(0, 7)}_`;
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
